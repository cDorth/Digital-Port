{% extends "base.html" %}

{% block title %}Access Forbidden - Digital Portfolio{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-lg-6 text-center">
            <div class="py-5">
                <i class="fas fa-lock fa-5x text-danger mb-4"></i>
                <h1 class="display-4 fw-bold">403</h1>
                <h2 class="mb-4">Access Forbidden</h2>
                <p class="lead mb-4">Sorry, you don't have permission to access this resource.</p>
                <div class="d-flex gap-3 justify-content-center">
                    <a href="{{ url_for('index') }}" class="btn btn-primary">
                        <i class="fas fa-home me-1"></i>Go Home
                    </a>
                    {% if not current_user.is_authenticated %}
                    <a href="{{ url_for('login') }}" class="btn btn-outline-primary">
                        <i class="fas fa-sign-in-alt me-1"></i>Login
                    </a>
                    {% endif %}
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
